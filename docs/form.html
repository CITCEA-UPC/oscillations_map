<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Data Entry Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f2444;
            --primary-dark: #09162e;
            --primary-light: #1a3a6b;
            --accent: #4a9eff;
            --success: #28a745;
            --success-hover: #34ce57;
            --text: #1a1a2e;
            --text-secondary: #555;
            --bg: #f0f2f5;
            --white: #fff;
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg), #e0e5ec);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--white);
            padding: 28px 32px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            margin-top: 20px;
            animation: slideUp 0.3s ease;
        }

        .container::-webkit-scrollbar {
            width: 6px;
        }

        .container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .container::-webkit-scrollbar-track {
            background: transparent;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .notice {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #8d6e00;
            line-height: 1.5;
        }

        label {
            font-weight: 600;
            display: block;
            font-size: 13px;
            color: var(--text);
            margin-top: 16px;
            margin-bottom: 4px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d0d5dd;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            background: var(--white);
            color: var(--text);
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.15);
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        input::placeholder,
        textarea::placeholder {
            font-size: 13px;
            color: #aaa;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .checkbox-group input {
            width: auto;
            height: 18px;
            margin: 0;
            accent-color: var(--primary-light);
        }

        .checkbox-group label {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            width: 100%;
            margin-top: 24px;
            transition: all var(--transition);
            box-shadow: 0 4px 14px rgba(15, 36, 68, 0.25);
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(15, 36, 68, 0.35);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 20px;
                max-height: 95vh;
                margin-top: 8px;
            }

            h2 {
                font-size: 18px;
            }

            input,
            textarea {
                font-size: 13px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Add a New Data Point</h2>
    <div class="notice">
        This form is a reference only. To submit new data, please contact the research team directly via email.
    </div>
    <form method="post" action="javascript:alert('Form submission is disabled in the static version. Please contact the research team.')">
        <label for="id">ID:</label>
        <input type="number" name="id" id="id" required>

        <label for="country">Country:</label>
        <input type="text" name="country" id="country" placeholder="India">

        <label for="Region_state">Region/State:</label>
        <input type="text" name="Region_state" id="Region_state" placeholder="Rajasthan">

        <div class="checkbox-group">
            <input type="checkbox" name="europe" id="europe">
            <label for="europe">Is in Europe?</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" name="repetitive" id="repetitive">
            <label for="repetitive">Is repetitive?</label>
        </div>

        <label for="last_observation">Last Observation:</label>
        <input type="text" name="last_observation" id="last_observation" placeholder="2023/07">

        <label for="trigger">Trigger:</label>
        <input type="text" name="trigger" id="trigger" placeholder="Not identified">

        <label for="duration">Duration:</label>
        <input type="text" name="duration" id="duration" placeholder="Hours">

        <label for="frequency">Frequency:</label>
        <input type="text" name="frequency" id="frequency" placeholder="3">

        <label for="involved_devices">Involved Devices:</label>
        <input type="text" name="involved_devices" id="involved_devices" placeholder="Photovoltaic Plant">

        <label for="propagation">Propagation:</label>
        <input type="text" name="propagation" id="propagation" placeholder="Contained in Rajasthan ISTS Complex">

        <label for="distance">Distance:</label>
        <input type="text" name="distance" id="distance" placeholder="400">

        <label for="radius">Radius:</label>
        <input type="text" name="radius" id="radius" placeholder="400">

        <label for="outages">Outages:</label>
        <input type="text" name="outages" id="outages" placeholder="No">

        <label for="identification">Identification:</label>
        <input type="text" name="identification" id="identification" placeholder="PMU Data">

        <label for="method">Method:</label>
        <input type="text" name="method" id="method" placeholder="Transient simulation with EMT models">

        <label for="purported">Purported Cause:</label>
        <input type="text" name="purported" id="purported" placeholder="Slow polling rates and incorrect tuning">

        <label for="mitigation_measures">Mitigation Measures:</label>
        <input type="text" name="mitigation_measures" id="mitigation_measures" placeholder="Returning">

        <label for="images">Images (comma-separated):</label>
        <input type="text" name="images" id="images" placeholder="images/Rajasthan.png,images/Linear_rajasthan.png">

        <label for="links">Links (comma-separated):</label>
        <input type="text" name="links" id="links" placeholder="https://example.com">

        <label for="coordinates">Coordinates:</label>
        <input type="text" name="coordinates" id="coordinates" placeholder="26.852356, 71.509525">

        <label for="first_observation">First Observation:</label>
        <input type="text" name="first_observation" id="first_observation" placeholder="2023/01">

        <label for="grid">Grid:</label>
        <input type="text" name="grid" id="grid" placeholder="India, Rajasthan">

        <label for="points">Points (Optional JSON):</label>
        <textarea name="points" id="points" placeholder='[{"name": "Fatehgarh I", "coordinates": "26.8523556, 71.5095250", "guilty": true}]'></textarea>

        <label for="connections">Connections (Optional JSON):</label>
        <textarea name="connections" id="connections" placeholder='[{"from": "Fatehgarh I", "to": "Fatehgarh II", "color": "gray"}]'></textarea>

        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>
</body>
</html>
